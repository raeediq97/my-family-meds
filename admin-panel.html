<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة الأدوية المتقدمة</title>
    <style>
        :root {
            --primary-color: #2c5282;
            --success-color: #38a169;
            --danger-color: #e53e3e;
            --warning-color: #dd6b20;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        header h1 { color: var(--primary-color); font-size: 1.8rem; }

        .form-card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        .expiry-selects { display: flex; gap: 10px; }
        .expiry-selects select { flex: 1; }
        
        label { font-weight: bold; font-size: 0.95rem; color: #4a5568; }
        input, select, textarea { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1rem; outline: none; width: 100%; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-color); }

        .btn-container { display: flex; gap: 10px; }
        .btn { background: var(--primary-color); color: white; padding: 12px 20px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-danger { background: var(--danger-color); }
        .btn-danger:hover { background: #c53030; }
        .btn-cancel { background: #718096; }

        .table-container { background: var(--card-bg); border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 700px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #edf2f7; }
        th { background: #edf2f7; color: #4a5568; }
        
        .btn-table { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; color: white; font-weight: bold; margin-left: 5px; }
        .btn-edit { background: var(--warning-color); }
        .btn-del { background: var(--danger-color); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>إضافة وإدارة مخزون الأدوية 🛠️</h1>
            <button class="btn btn-danger" onclick="deleteExpiredMedicines()">⚠️ حذف الأدوية منتهية الصلاحية</button>
        </header>

        <div class="form-card">
            <h3 id="formTitle" style="margin-bottom: 15px; color: var(--primary-color);">إضافة دواء جديد</h3>
            <form id="medicineForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="editMedId">
                <div class="form-grid">
                    
                    <div class="form-group">
                        <label for="medName">اسم الدواء:</label>
                        <input type="text" id="medName" required placeholder="مثال: بندول...">
                    </div>

                    <div class="form-group">
                        <label for="medType">نوع الدواء:</label>
                        <select id="medType" required onchange="handleTypeChange()">
                            <option value="حبوب">حبوب</option>
                            <option value="كبسول">كبسول</option>
                            <option value="شراب">شراب</option>
                            <option value="عصارات">عصارات (مرهم، جل، كريم)</option>
                            <option value="قطرات">قطرات (عين، أذن، أنف، فم)</option>
                            <option value="تحميله">تحميله</option>
                            <option value="فيتامين">فيتامين</option>
                            <option value="هرمون">هرمون</option>
                            <option value="ابره">ابره</option>
                            <option value="فوار">فوار</option>
                            <option value="باودر">باودر</option>
                            <option value="مغذي">مغذي</option>
                            <option value="خلطه">خلطه</option>
                            <option value="اخرى">اخرى</option>
                        </select>
                    </div>

                    <div class="form-group hidden" id="subTypeContainer">
                        <label id="subTypeLabel" for="medSubType">التصنيف الفرعي:</label>
                        <select id="medSubType">
                        </select>
                    </div>

                    <div class="form-group hidden" id="customTypeContainer">
                        <label for="medCustomType">اكتب نوع الدواء:</label>
                        <input type="text" id="medCustomType" placeholder="ادخل النوع المخصص...">
                    </div>

                    <div class="form-group">
                        <label for="medDose">الجرعة:</label>
                        <input type="text" id="medDose" required placeholder="مثال: 500 ملغم، 10 مللتر...">
                    </div>

                    <div class="form-group">
                        <label for="medCount">العدد / الكمية:</label>
                        <input type="text" id="medCount" required placeholder="مثال: 2 شريط...">
                    </div>

                    <div class="form-group">
                        <label>تاريخ الصلاحية:</label>
                        <div class="expiry-selects">
                            <select id="medExpiryMonth" required>
                                <option value="" disabled selected>الشهر</option>
                                <option value="01">01 - كانون الثاني</option>
                                <option value="02">02 - شباط</option>
                                <option value="03">03 - آذار</option>
                                <option value="04">04 - نيسان</option>
                                <option value="05">05 - أيار</option>
                                <option value="06">06 - حزيران</option>
                                <option value="07">07 - تموز</option>
                                <option value="08">08 - آب</option>
                                <option value="09">09 - أيلول</option>
                                <option value="10">10 - تشرين الأول</option>
                                <option value="11">11 - تشرين الثاني</option>
                                <option value="12">12 - كانون الأول</option>
                            </select>
                            
                            <select id="medExpiryYear" required>
                                <option value="" disabled selected>السنة</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="medImg">رابط الصورة (اختياري):</label>
                        <input type="url" id="medImg" placeholder="https://drive.google.com/...">
                    </div>

                    <div class="form-group full-width">
                        <label for="medNotes">ملاحظات:</label>
                        <textarea id="medNotes" rows="2" placeholder="طريقة الاستخدام..."></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label for="medOthers">تفاصيل أخرى (نص طويل):</label>
                        <textarea id="medOthers" rows="2"></textarea>
                    </div>

                </div>
                <div class="btn-container">
                    <button type="submit" id="submitBtn" class="btn">حفظ الدواء في السحابة ➕</button>
                    <button type="button" id="cancelEditBtn" class="btn btn-cancel hidden" onclick="resetForm()">إلغاء التعديل</button>
                </div>
            </form>
        </div>

        <h2>الأدوية المتوفرة حالياً في المخزن</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>اسم الدواء</th>
                        <th>النوع الكامل</th>
                        <th>الجرعة</th>
                        <th>العدد</th>
                        <th>الصلاحية</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <tr><td colspan="6" style="text-align:center;">جاري تحميل المخزن السحابي...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz8ut1q8j4f7DIqgGDQ_ZiKcLN9AuFLcoJ-IsUNzVPj0m-LxZkYll57svnIxEHjeiP1/exec";
        let medicines = [];
        let isEditMode = false;

        function generateYearOptions() {
            const yearSelect = document.getElementById('medExpiryYear');
            const currentYear = new Date().getFullYear();
            for (let i = 0; i <= 10; i++) {
                const year = currentYear + i;
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            }
        }

        function handleTypeChange() {
            const mainType = document.getElementById('medType').value;
            const subContainer = document.getElementById('subTypeContainer');
            const subSelect = document.getElementById('medSubType');
            const subLabel = document.getElementById('subTypeLabel');
            const customContainer = document.getElementById('customTypeContainer');

            subContainer.classList.add('hidden');
            customContainer.classList.add('hidden');
            subSelect.removeAttribute('required');
            document.getElementById('medCustomType').removeAttribute('required');

            if (mainType === "عصارات") {
                subContainer.classList.remove('hidden');
                subLabel.textContent = "نوع العصارة الفرعي:";
                subSelect.innerHTML = `
                    <option value="مرهم">مرهم</option>
                    <option value="جل">جل</option>
                    <option value="كريم">كريم</option>
                `;
                subSelect.setAttribute('required', 'required');
            } else if (mainType === "قطرات") {
                subContainer.classList.remove('hidden');
                subLabel.textContent = "نوع القطرة الفرعي:";
                subSelect.innerHTML = `
                    <option value="عين">عين</option>
                    <option value="أذن">أذن</option>
                    <option value="أنف">أنف</option>
                    <option value="فم">فم</option>
                `;
                subSelect.setAttribute('required', 'required');
            } else if (mainType === "اخرى") {
                customContainer.classList.remove('hidden');
                document.getElementById('medCustomType').setAttribute('required', 'required');
            }
        }

        async function fetchMedicines() {
            try {
                const response = await fetch(API_URL);
                medicines = await response.json();
                renderTable();
            } catch (error) {
                document.getElementById('adminTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">فشل الاتصال بقاعدة البيانات.</td></tr>';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';

            if(medicines.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">المخزن فارغ حالياً.</td></tr>';
                return;
            }

            medicines.forEach((med) => {
                // تقليم التاريخ وعرضه بشكل نظيف في الجدول أيضاً
                let displayExpiry = med.expiry ? med.expiry.toString().trim() : "";
                if (displayExpiry.length > 7) {
                    displayExpiry = displayExpiry.substring(0, 7);
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${med.name}</strong></td>
                    <td>${med.type}</td>
                    <td>${med.dose}</td>
                    <td>${med.count}</td>
                    <td>${displayExpiry}</td>
                    <td>
                        <button class="btn-table btn-edit" onclick="startEdit('${med.id}')">تعديل 📝</button>
                        <button class="btn-table btn-del" onclick="deleteMedicine('${med.id}')">حذف 🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function startEdit(id) {
            const med = medicines.find(m => m.id.toString() === id.toString());
            if(!med) return;
            
            isEditMode = true;
            document.getElementById('formTitle').textContent = `تعديل الدواء: ${med.name}`;
            document.getElementById('submitBtn').textContent = "تحديث التعديلات 💾";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('editMedId').value = med.id;
            
            document.getElementById('medName').value = med.name;
            document.getElementById('medDose').value = med.dose;
            document.getElementById('medCount').value = med.count;
            
            // تنظيف النص قبل التفكيك والتوزيع على القوائم المنسدلة
            let cleanExp = med.expiry ? med.expiry.toString().trim() : "";
            if (cleanExp.length > 7) cleanExp = cleanExp.substring(0, 7);

            if(cleanExp && cleanExp.includes('-')) {
                const parts = cleanExp.split('-');
                document.getElementById('medExpiryYear').value = parts[0];
                document.getElementById('medExpiryMonth').value = parts[1];
            }

            document.getElementById('medImg').value = (med.img === "💊" || med.img === "🧴" || med.img === "💧") ? "" : med.img;
            document.getElementById('medNotes').value = med.notes;
            document.getElementById('medOthers').value = med.others;

            if(med.type.startsWith("عصارات")) {
                document.getElementById('medType').value = "عصارات";
                handleTypeChange();
                const subValue = med.type.match(/\(([^)]+)\)/);
                if(subValue) document.getElementById('medSubType').value = subValue[1];
            } else if(med.type.startsWith("قطرات")) {
                document.getElementById('medType').value = "قطرات";
                handleTypeChange();
                const subValue = med.type.match(/\(([^)]+)\)/);
                if(subValue) document.getElementById('medSubType').value = subValue[1];
            } else if(!["حبوب","كبسول","شراب","تحميله","فيتامين","هرمون","ابره","فوار","باودر","مغذي","خلطه"].includes(med.type)) {
                document.getElementById('medType').value = "اخرى";
                handleTypeChange();
                document.getElementById('medCustomType').value = med.type;
            } else {
                document.getElementById('medType').value = med.type;
                handleTypeChange();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            isEditMode = false;
            document.getElementById('formTitle').textContent = "إضافة دواء جديد";
            document.getElementById('submitBtn').textContent = "حفظ الدواء في السحابة ➕";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('medicineForm').reset();
            handleTypeChange();
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const mainType = document.getElementById('medType').value;
            let finalType = mainType;
            if(mainType === "عصارات" || mainType === "قطرات") {
                finalType = `${mainType} (${document.getElementById('medSubType').value})`;
            } else if(mainType === "اخرى") {
                finalType = document.getElementById('medCustomType').value;
            }

            const year = document.getElementById('medExpiryYear').value;
            const month = document.getElementById('medExpiryMonth').value;
            const finalExpiry = `${year}-${month}`;

            const medData = {
                action: isEditMode ? "UPDATE" : "ADD",
                id: isEditMode ? document.getElementById('editMedId').value : "ID-" + Date.now(),
                name: document.getElementById('medName').value,
                type: finalType,
                dose: document.getElementById('medDose').value,
                count: document.getElementById('medCount').value,
                expiry: finalExpiry, 
                img: document.getElementById('medImg').value || "💊",
                notes: document.getElementById('medNotes').value,
                others: document.getElementById('medOthers').value
            };

            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(medData)
                });
                alert(isEditMode ? 'تم تحديث الدواء بنجاح!' : 'تم إضافة الدواء بنجاح!');
                resetForm();
                fetchMedicines();
            } catch (error) {
                alert('حدث خطأ أثناء الاتصال بالسحابة!');
            } finally {
                btn.disabled = false;
            }
        }

        async function deleteMedicine(id) {
            if(!confirm('هل أنت متأكد من حذف هذا الدواء؟')) return;
            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "DELETE", id: id })
                });
                alert('تم الحذف!');
                fetchMedicines();
            } catch (error) {
                fetchMedicines();
            }
        }

        async function deleteExpiredMedicines() {
            if(!confirm('🚨 هل أنت متأكد من حذف جميع الأدوية منتهية الصلاحية؟'));
            document.getElementById('adminTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center; color:orange;">جاري فحص وحذف المنتهي سحابياً... ⏳</td></tr>';
            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "DELETE_EXPIRED" })
                });
                alert('تم تنظيف المخزن وحذف كافة الأدوية منتهية الصلاحية بنجاح!');
                fetchMedicines();
            } catch (error) {
                alert('حدث خطأ أثناء الحذف التلقائي!');
                fetchMedicines();
            }
        }

        generateYearOptions();
        fetchMedicines();
    </script>
</body>
</html>
